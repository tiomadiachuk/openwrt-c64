name: Build OpenWrt Archer C64 V1 Custom

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
        python3 rsync unzip zlib1g-dev file wget curl

    - name: Clone OpenWrt snapshot
      run: |
        git clone https://github.com/openwrt/openwrt
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Apply custom config
      run: |
        cd openwrt
        # Target для Archer C64 V1 (MT7622)
        echo "CONFIG_TARGET_mediatek=y" >> .config
        echo "CONFIG_TARGET_mediatek_mt7622=y" >> .config
        echo "CONFIG_TARGET_mediatek_mt7622_DEVICE_tplink_archer-c64-v1=y" >> .config

        # Основні пакети
        echo "CONFIG_PACKAGE_luci=y" >> .config
        echo "CONFIG_PACKAGE_wpad-openssl=y" >> .config
        echo "CONFIG_PACKAGE_openssh-sftp-server=y" >> .config
        echo "CONFIG_PACKAGE_kmod-usb-storage=y" >> .config
        echo "CONFIG_PACKAGE_block-mount=y" >> .config

        # LAN4 як WAN через DHCP
        echo "CONFIG_PACKAGE_lan4_wan=y" >> .config  # умовне ім’я для пояснення
        # Тут можна підправити через patch після білду, якщо потрібно

        # Wi-Fi налаштування (SSID і пароль будуть через UCI після прошивки)
        make defconfig

    - name: Build firmware
      run: |
        cd openwrt
        make -j$(nproc)

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: openwrt/bin/targets/
